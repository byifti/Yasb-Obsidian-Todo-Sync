# config.ini — Obsidian ↔ YASB Todo Sync
# ========================================
# Fill in your paths below, then save.

[paths]
# Full path to your Obsidian .md task file
obsidian_md = C:\path\to\your\Obsidian\Vault\To Do List.md

# Path to YASB's todo.json
# Default location: C:\Users\<username>\.config\yasb\todo.json
yasb_json = C:\Users\<username>\.config\yasb\todo.json

[settings]
# Seconds to wait after a file change before syncing.
# Increase if you get double-syncs on slow machines. Default: 0.4
debounce_secs = 0.4

# Where to write the log file. Defaults to sync.log in this folder.
# log_file = C:\path\to\sync.log
